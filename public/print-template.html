<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Quality Report - Food Printing</title>
  <link rel="stylesheet" href="print-template.css" />
  <style>
    /* quick fallback if CSS not loaded */
    body { font-family: Arial, sans-serif; color:#222; margin:20mm; }
  </style>
</head>
<body>
  <header class="pdf-header">
    <div class="header-left">
      <h1 id="report-title">RELATÓRIO DE QUALIDADE</h1>
      <p id="report-sub" class="subtitle">Food Printing Quality Calculator</p>
    </div>
  </header>

  <hr class="divider" />

  <main id="pdf-content">
    <!-- injected by renderer (prepare-print-view) -->
  </main>

  <footer class="pdf-footer">
    <span class="page-number"></span>
  </footer>

  <script>
    // This file is used by the hidden print window.
    // It listens for 'prepare-print-view' sent from mainWindow via main process,
    // renders content into #pdf-content and notifies main that it's ready.

    // helper to create parameter table rows
    function buildParamRow(label, weight, score, weighted) {
      return `<tr>
        <td>${label}</td>
        <td style="text-align:center">${(+weight).toFixed(2)}</td>
        <td style="text-align:center">${score}</td>
        <td style="text-align:center">${(+weighted).toFixed(2)}</td>
      </tr>`;
    }

    // this will be filled by the exposed API from preload: window.electron.onPreparePrintView
    if (window.electron && window.electron.onPreparePrintView) {
      window.electron.onPreparePrintView(renderPrintContent);
    }

    async function renderPrintContent(data) {
      // data: { selectedEntries } OR { sampleInfo, scores, weights }
      // data.translations may be present
      const t = (data.translations || {
        parameter: 'Parameter', weight: 'Weight', score: 'Score', weightedScore: 'Weighted score',
        finalScore: 'Final score', quality: 'Quality', ingredients: 'Ingredients', parameters: 'Parameters'
      });

      document.getElementById('report-title').textContent = t.printReport || (t.title || 'Quality Report');

      const container = document.getElementById('pdf-content');
      container.innerHTML = '';

      const entries = Array.isArray(data.selectedEntries) ? data.selectedEntries : [ { sampleInfo: data.sampleInfo, scores: data.scores, weights: data.weights } ];

      entries.forEach(entry => {
        const sample = entry.sampleInfo || {
          sampleCode: entry.sampleCode || entry.sampleCode,
          date: entry.date || entry.date
        };

        // header
        const header = document.createElement('div');
        header.className = 'section';
        header.innerHTML = `
          <div class="sample-header">
            <h2>${sample.sampleCode || (entry.sampleCode||'Sample')}</h2>
            <p><strong>${t.date || 'Date'}:</strong> ${sample.date || (entry.date || '')}</p>
            <p><strong>${t.ingredients || 'Ingredients'}:</strong> ${entry.ingredients || sample.ingredients || '-'}</p>
          </div>
        `;

        // parameters table
        const paramTable = document.createElement('div');
        const weightsObj = entry.weights || data.weights || {};
        const scoresObj = entry.scores || entry.scores || {};
        let paramRows = '';
        // List parameters in the weightsObj order if present otherwise fallback to scoresObj keys
        const keys = Object.keys(weightsObj).length ? Object.keys(weightsObj) : Object.keys(scoresObj);
        keys.forEach(k => {
          const w = weightsObj[k] ?? 0;
          const s = scoresObj[k] ?? 0;
          const weighted = (Number(w) || 0) * (Number(s) || 0);
          // label fallback to key
          const label = (data.translations && data.translations[k]) ? data.translations[k] : k;
          paramRows += buildParamRow(label, w, s, weighted);
        });

        // final score if present
        const finalScore = entry.score ?? (Object.keys(weightsObj).length
          ? keys.reduce((acc,k)=> acc + ((Number(weightsObj[k]||0)) * (Number(scoresObj[k]||0))), 0)
          : 0);

        const qualityLabel = entry.quality || '';

        paramTable.innerHTML = `
          <h3 class="section-title">${t.parameters || 'Parameters'}</h3>
          <table>
            <thead>
              <tr>
                <th>${t.parameter || 'Parameter'}</th>
                <th style="text-align:center">${t.weight || 'Weight'}</th>
                <th style="text-align:center">${t.score || 'Score'}</th>
                <th style="text-align:center">${t.weightedScore || 'Weighted'}</th>
              </tr>
            </thead>
            <tbody>
              ${paramRows}
            </tbody>
            <tfoot>
              <tr>
                <td colspan="3" style="text-align:right"><strong>${t.finalScore || 'Final score'}</strong></td>
                <td style="text-align:center"><strong>${(+finalScore).toFixed(2)}</strong></td>
              </tr>
              <tr>
                <td colspan="3" style="text-align:right"><strong>${t.quality || 'Quality'}</strong></td>
                <td style="text-align:center">${qualityLabel}</td>
              </tr>
            </tfoot>
          </table>
        `;

        header.appendChild(paramTable);
        container.appendChild(header);
      });

      // small delay to ensure fonts/charts render then notify main
      setTimeout(() => {
        if (window.electron && window.electron.notifyPrintReady) {
          window.electron.notifyPrintReady();
        } else if (window.electron && window.electron.readyToPrint) {
          window.electron.readyToPrint();
        } else {
          // fallback: dispatch event (not necessary usually)
        }
      }, 400);
    }
  </script>
</body>
</html>
